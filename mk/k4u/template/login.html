<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>用户登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:url('https://cdn-community.bcmcdn.com/47/community/YWuLhTos3FZSdObZeGvlGyaXB8LnHn4kptiExP9AopMn.png?hash=FvVAfpVK_ZiECgjOFP90btJXF9t0') no-repeat center center fixed;background-size:cover;min-height:100vh;padding-bottom:40px}
.loader{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.9);display:flex;justify-content:center;align-items:center;z-index:9999}
.loader img{width:64px;height:64px;border-radius:50%}
header{width:100%;height:64px;background:rgba(255,255,255,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);position:fixed;top:0;left:0;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(0,0,0,.1);animation:slideDown 0.5s ease-out;z-index:100}
.wrap{max-width:1400px;margin:0 auto;width:100%;display:flex;align-items:center}
.logo{display:flex;align-items:center;color:#2196f3;font-size:24px;font-weight:bold;margin-right:20px}
.logo-icon{width:32px;height:32px;margin-right:8px;border-radius:6px;overflow:hidden}
.logo-icon img{width:100%;height:100%;object-fit:cover}
.head-space{flex:1}
.search{height:36px;width:280px;background:rgba(0,0,0,.05);border-radius:4px;display:flex;align-items:center;padding:0 10px}
.search input{background:transparent;border:none;outline:none;color:#333;width:100%}
.search input::placeholder{color:#999}
.main-box{max-width:400px;margin:0 auto;padding-top:80px;padding-left:16px;padding-right:16px}
.card{background:rgba(255,255,255,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,.1);overflow:hidden;border:1px solid rgba(255,255,255,.5);padding:24px}
.nav-links{display:flex;gap:16px}
.nav-links a{color:#333;text-decoration:none}
.nav-links a:hover{color:#2196f3}
.form-group{margin-bottom:16px}
.form-group label{display:block;color:#333;margin-bottom:8px;font-weight:500}
.form-group input{width:100%;padding:12px;border:1px solid rgba(0,0,0,.1);border-radius:4px;font-size:14px;outline:none;background:rgba(255,255,255,.6)}
.form-group input:focus{border-color:#2196f3}
.btn{background:#2196f3;color:#fff;padding:12px 24px;border:none;border-radius:4px;cursor:pointer;text-decoration:none;font-size:16px;width:100%}
.btn:hover{background:#1976d2}
h1{color:#333;margin-bottom:24px;text-align:center}
.tip{text-align:center;color:#999;font-size:14px;margin-top:16px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000}
.modal.active{display:flex}
.modal-content{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:24px;border-radius:8px;width:320px;text-align:center;border:1px solid rgba(255,255,255,.5)}
.modal-content .icon{font-size:48px;color:#f44336;margin-bottom:16px}
.modal-content p{color:#333;margin-bottom:20px}
.modal-content button{background:#2196f3;color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer}
.modal-content button:hover{background:#1976d2}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.card{animation:slideDown 0.5s ease-out}
</style>
</head>
<body>
<header>
<div class="wrap">
<div class="logo">用户中心</div>
<div class="nav-links">
<a href="/mk/k4u">插件市场</a>
<a href="/login" class="active">登录</a>
</div>
</div>
</header>
<div class="main-box">
<div class="card">
<h1>用户登录</h1>
<form method="post">
<div class="form-group">
<label>用户名</label>
<input type="text" name="username" required placeholder="请输入用户名">
</div>
<div class="form-group">
<label>密码</label>
<input type="password" name="password" required placeholder="请输入密码">
</div>
<button type="submit" class="btn">登录</button>
</form>
<div class="tip" style="margin-top:16px">
默认管理员账号: admin / admin
</div>
<div style="text-align:center;margin-top:12px">
还没有账号？<a href="/register" style="color:#2196f3;text-decoration:none">立即注册</a>
</div>
</div>
</div>
<div class="modal" id="errorModal">
<div class="modal-content">
<div class="icon">✕</div>
<p id="errorMessage"></p>
<button onclick="closeModal()">确定</button>
</div>
</div>
<script>
window.addEventListener('load', function() {
    document.getElementById('loader').style.display = 'none';
});
function showError(message) {
    document.getElementById('errorMessage').textContent = message;
    document.getElementById('errorModal').classList.add('active');
}
function closeModal() {
    document.getElementById('errorModal').classList.remove('active');
}
{% if error %}
showError('{{ error }}');
{% endif %}
</script>
</body>
</html>
