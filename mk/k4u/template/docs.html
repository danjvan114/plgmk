<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="https://unpkg.com/mdui@1.0.2/dist/js/mdui.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/mdui@1.0.2/dist/css/mdui.min.css">
    <link rel="icon" type="image/x-icon" href="/localcdn/ico.png">
    <meta charset="UTF-8">
<title>开发文档 - K4U插件市场</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#fff;min-height:100vh;display:flex}
.sidebar{width:280px;background:#f5f5f5;border-right:1px solid #e0e0e0;position:fixed;left:0;top:64px;bottom:0;overflow-y:auto;transition:transform 0.3s}
.sidebar.collapsed{transform:translateX(-100%)}
.main-content{flex:1;display:flex;flex-direction:column;margin-left:280px;transition:margin-left 0.3s}
.main-content.full-width{margin-left:0}
header{width:100%;height:64px;background:#fff;border-bottom:1px solid #e0e0e0;position:fixed;top:0;left:0;display:flex;align-items:center;padding:0 16px;z-index:100}
header .menu-btn{background:none;border:none;font-size:24px;color:#333;cursor:pointer;margin-right:16px;padding:8px}
header .menu-btn:hover{color:#4caf50}
header .title{font-size:18px;font-weight:bold;color:#333}
.progress-container{position:fixed;top:64px;left:0;right:0;height:4px;background:#e0e0e0;z-index:99}
.progress-container.hidden{display:none}
.progress-container .mdui-progress{margin:0;height:100%}
.progress-container .mdui-progress-indeterminate{height:100%}
.pdf-container{flex:1;padding:80px 20px 20px;overflow:auto}
.pdf-viewer{width:100%;min-height:calc(100vh - 100px)}
.empty-state{display:flex;flex-direction:column;justify-content:center;align-items:center;height:calc(100vh - 150px);color:#999}
.empty-state i{font-size:64px;margin-bottom:16px}
.empty-state p{font-size:16px}
.doc-tree{padding:16px}
.doc-tree ul{list-style:none;padding-left:0}
.doc-tree li{margin-bottom:4px}
.doc-tree .folder{font-weight:bold;color:#333;cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:4px}
.doc-tree .folder:hover{background:rgba(76,175,80,.1)}
.doc-tree .file{color:#666;padding:4px 8px 4px 28px;border-radius:4px;cursor:pointer}
.doc-tree .file:hover{background:rgba(76,175,80,.1);color:#4caf50}
.doc-tree .file.active{background:rgba(76,175,80,.15);color:#4caf50}
.doc-tree .toggle-icon{font-size:12px;color:#999}
.doc-tree .folder.open .toggle-icon{transform:rotate(90deg)}
.doc-tree .subtree{display:none;padding-left:16px}
.doc-tree .folder.open + .subtree{display:block}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:90}
.sidebar-overlay.show{display:block}
@media (max-width:768px){
    .sidebar{transform:translateX(-100%)}
    .sidebar.collapsed{transform:translateX(-100%)}
    .sidebar:not(.collapsed){transform:translateX(0)}
    .main-content{margin-left:0}
    .sidebar-overlay.show{display:block}
}
.page-controls{display:flex;justify-content:center;gap:16px;padding:16px;border-top:1px solid #e0e0e0;background:#fafafa}
.page-controls button{background:#4caf50;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer}
.page-controls button:hover{background:#388e3c}
.page-controls button:disabled{background:#ccc;cursor:not-allowed}
.page-controls input{width:60px;padding:8px;border:1px solid #e0e0e0;border-radius:4px;text-align:center}
</style>
</head>
<body>
<header>
<button class="menu-btn mdui-ripple" onclick="toggleSidebar()">
    <i class="mdui-icon material-icons">menu</i>
</button>
<div class="title">开发文档</div>
</header>

<div class="progress-container" id="progressBar">
<div class="mdui-progress">
    <div class="mdui-progress-indeterminate"></div>
</div>
</div>

<div class="sidebar" id="sidebar">
<div class="doc-tree">
<h3 style="padding:8px;margin-bottom:12px;color:#333;font-size:14px">文档目录</h3>
<ul>
{{ tree_html|safe }}
</ul>
</div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="main-content" id="mainContent">
<div class="pdf-container" id="pdfContainer">
<div class="empty-state">
<i class="mdui-icon material-icons">description</i>
<p>请从左侧选择一个文档查看</p>
</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
const MARKET_ID = '{{ market_id }}';
let pdfDoc = null;
let currentPage = 1;

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const mainContent = document.getElementById('mainContent');
    sidebar.classList.toggle('collapsed');
    overlay.classList.toggle('show');
    mainContent.classList.toggle('full-width');
}

async function loadPDF(filePath) {
    const container = document.getElementById('pdfContainer');
    const progress = document.getElementById('progressBar');
    
    progress.classList.remove('hidden');
    container.innerHTML = '<canvas id="pdfCanvas" class="pdf-viewer"></canvas>';
    
    const url = '/localcdn/doc/' + MARKET_ID + '/' + filePath;
    
    try {
        pdfDoc = await pdfjsLib.getDocument(url).promise;
        currentPage = 1;
        await renderPage(currentPage);
        addPageControls();
    } catch (error) {
        container.innerHTML = '<div class="empty-state"><i class="mdui-icon material-icons">error</i><p>无法加载PDF文件</p></div>';
    } finally {
        progress.classList.add('hidden');
    }
}

async function renderPage(pageNum) {
    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');
    const page = await pdfDoc.getPage(pageNum);
    
    const viewport = page.getViewport({ scale: 1.5 });
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    
    const renderContext = {
        canvasContext: ctx,
        viewport: viewport
    };
    
    await page.render(renderContext).promise;
}

function addPageControls() {
    const container = document.getElementById('pdfContainer');
    if (document.querySelector('.page-controls')) return;
    
    const controls = document.createElement('div');
    controls.className = 'page-controls';
    controls.innerHTML = `
        <button onclick="prevPage()" id="prevBtn">上一页</button>
        <input type="number" id="pageInput" value="1" min="1" max="${pdfDoc.numPages}">
        <span>/ ${pdfDoc.numPages}</span>
        <button onclick="nextPage()" id="nextBtn">下一页</button>
    `;
    container.appendChild(controls);
    updatePageControls();
}

function updatePageControls() {
    document.getElementById('pageInput').value = currentPage;
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= pdfDoc.numPages;
}

async function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        await renderPage(currentPage);
        updatePageControls();
    }
}

async function nextPage() {
    if (currentPage < pdfDoc.numPages) {
        currentPage++;
        await renderPage(currentPage);
        updatePageControls();
    }
}

function toggleFolder(el) {
    el.classList.toggle('open');
}

function selectFile(el, filePath) {
    document.querySelectorAll('.doc-tree .file').forEach(f => f.classList.remove('active'));
    el.classList.add('active');
    loadPDF(filePath);
}
</script>
</body>
</html>
