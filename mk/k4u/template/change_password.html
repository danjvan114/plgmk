<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>修改密码</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:url('https://cdn-community.bcmcdn.com/47/community/YWuLhTos3FZSdObZeGvlGyaXB8LnHn4kptiExP9AopMn.png?hash=FvVAfpVK_ZiECgjOFP90btJXF9t0') no-repeat center center fixed;background-size:cover;min-height:100vh}
header{width:100%;height:64px;background:rgba(255,255,255,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);position:fixed;top:0;left:0;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(0,0,0,.1)}
.wrap{max-width:1400px;margin:0 auto;width:100%;display:flex;align-items:center}
.logo{color:#2196f3;font-size:24px;font-weight:bold;margin-right:20px}
.head-space{flex:1}
.search{height:36px;width:280px;background:rgba(0,0,0,.05);border-radius:4px;display:flex;align-items:center;padding:0 10px}
.search input{background:transparent;border:none;outline:none;color:#333;width:100%}
.search input::placeholder{color:#999}
.main-box{max-width:400px;margin:0 auto;padding-top:80px;padding-left:16px;padding-right:16px}
.card{background:rgba(255,255,255,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,.1);overflow:hidden;border:1px solid rgba(255,255,255,.5);padding:24px}
.nav-links{display:flex;gap:16px}
.nav-links a{color:#333;text-decoration:none}
.nav-links a:hover{color:#2196f3}
.form-group{margin-bottom:16px}
.form-group label{display:block;color:#333;margin-bottom:8px;font-weight:500}
.form-group input{width:100%;padding:12px;border:1px solid rgba(0,0,0,.1);border-radius:4px;font-size:14px;outline:none;background:rgba(255,255,255,.6)}
.form-group input:focus{border-color:#2196f3}
.btn{background:#2196f3;color:#fff;padding:12px 24px;border:none;border-radius:4px;cursor:pointer;text-decoration:none;font-size:16px}
.btn:hover{background:#1976d2}
.back-btn{background:#666;margin-right:12px}
.back-btn:hover{background:#555}
h1{color:#333;margin-bottom:24px}
</style>
</head>
<body>
<header>
<div class="wrap">
<div class="logo">用户中心</div>
<div class="nav-links">
<a href="/mk/kn">插件市场</a>
{% if users and users.get(session.user, {}).get('role') == 'admin' %}
<a href="/op/user">用户管理</a>
{% endif %}
</div>
<div style="margin-left:16px">
<a href="/change_password" class="btn">修改密码</a>
<a href="/logout" class="btn">退出</a>
</div>
</div>
</header>
<div class="main-box">
<div class="card">
<h1>修改密码</h1>
<form method="post">
<div class="form-group">
<label>原密码</label>
<input type="password" name="old_password" required placeholder="请输入原密码">
</div>
<div class="form-group">
<label>新密码</label>
<input type="password" name="new_password" required placeholder="请输入新密码">
</div>
<div class="form-group">
<label>确认新密码</label>
<input type="password" name="confirm_password" required placeholder="请再次输入新密码">
</div>
<div style="margin-top:24px">
<a href="/" class="btn back-btn">取消</a>
<button type="submit" class="btn">保存修改</button>
</div>
</form>
</div>
</div>
</body>
</html>
