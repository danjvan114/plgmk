<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="https://unpkg.com/mdui@1.0.2/dist/js/mdui.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/mdui@1.0.2/dist/css/mdui.min.css">
    <link rel="icon" type="image/x-icon" href="/localcdn/ico.png">
    <meta charset="UTF-8">
<title>用户注册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:url('https://cdn-community.bcmcdn.com/47/community/dwnLvzZWaQw60Me4Xr1qU6KmjuYIRNHdbRO68VxRyKPI.png?hash=Fqw8kL43C6kSrmGjhkBtUcXGvOco') no-repeat center center fixed;background-size:cover;min-height:100vh;padding-bottom:40px}
header{width:100%;height:64px;background:rgba(255,255,255,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);position:fixed;top:0;left:0;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(0,0,0,.1)}
.wrap{max-width:1400px;margin:0 auto;width:100%;display:flex;align-items:center}
.logo{display:flex;align-items:center;color:#2196f3;font-size:24px;font-weight:bold;margin-right:20px}
.nav-links{display:flex;gap:16px}
.nav-links a{color:#333;text-decoration:none}
.nav-links a:hover{color:#2196f3}
.main-box{max-width:400px;margin:0 auto;padding-top:80px;padding-left:16px;padding-right:16px}
.card{background:rgba(255,255,255,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,.1);overflow:hidden;border:1px solid rgba(255,255,255,.5);padding:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;color:#333;margin-bottom:8px;font-weight:500}
.form-group input{width:100%;padding:12px;border:1px solid rgba(0,0,0,.1);border-radius:4px;font-size:14px;outline:none;background:rgba(255,255,255,.6)}
.form-group input:focus{border-color:#2196f3}
.btn{background:#2196f3;color:#fff;padding:12px 24px;border:none;border-radius:4px;cursor:pointer;text-decoration:none;font-size:16px;width:100%}
.btn:hover{background:#1976d2}
h1{color:#333;margin-bottom:24px;text-align:center}
.tip{text-align:center;color:#999;font-size:14px;margin-top:16px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000}
.modal.active{display:flex}
.modal-content{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:24px;border-radius:8px;width:320px;text-align:center;border:1px solid rgba(255,255,255,.5)}
.modal-content .icon{font-size:48px;margin-bottom:16px}
.modal-content .success{color:#4caf50}
.modal-content .error{color:#f44336}
.modal-content p{color:#333;margin-bottom:20px}
.modal-content button{background:#2196f3;color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer}
.modal-content button:hover{background:#1976d2}
</style>
</head>
<body>
<header>
<div class="wrap">
<div class="logo">用户中心</div>
<div class="nav-links">
<a href="/mk/kn">KN插件市场</a>
<a href="/mk/k4u">K4U插件市场</a>
<a href="/login">登录</a>
<a href="/register" class="active">注册</a>
</div>
</div>
</header>
<div class="main-box">
<div class="card">
<h1>用户注册</h1>
<form method="post">
<div class="form-group">
<label>用户名</label>
<input type="text" name="username" required placeholder="请输入用户名">
</div>
<div class="form-group">
<label>密码</label>
<input type="password" name="password" required placeholder="请输入密码">
</div>
<div class="form-group">
<label>确认密码</label>
<input type="password" name="confirm_password" required placeholder="请再次输入密码">
</div>

<button type="submit" class="btn">注册</button>
</form>
<div style="text-align:center;margin-top:12px">
已有账号？<a href="/login" style="color:#2196f3;text-decoration:none">立即登录</a>
</div>
</div>
</div>
<div class="modal" id="modal">
<div class="modal-content">
<div class="icon" id="modalIcon">✕</div>
<p id="modalMessage"></p>
<button onclick="closeModal()">确定</button>
</div>
</div>
<script>
function showModal(type, message) {
    document.getElementById('modalIcon').textContent = type === 'success' ? '✓' : '✕';
    document.getElementById('modalIcon').className = 'icon ' + type;
    document.getElementById('modalMessage').textContent = message;
    document.getElementById('modal').classList.add('active');
}
function closeModal() {
    document.getElementById('modal').classList.remove('active');
    {% if success %}
    window.location.href = '/login';
    {% endif %}
}
{% if success %}
showModal('success', '{{ success }}');
{% endif %}
{% if error %}
showModal('error', '{{ error }}');
{% endif %}
</script>
</body>
</html>
